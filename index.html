<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock</title>
</head>
<body>
    <!-- CODes Update sooonnn -->
     <h1>DIGITAL CLOCK</h1>
     <div class="clock">
        <div class="h">
            <span id="hour">00</span>
            <span>HOUR</span>
        </div>
        <div class="m">
            <span id="minute">00</span>
            <span>MINUTES</span>
        </div>
        <div class="s">
            <span id="second">00</span>
            <span>SECONDS</span>
        </div>
     </div>
</body>
</html>
